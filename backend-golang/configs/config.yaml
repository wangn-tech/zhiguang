server:
  port: "8080"
  env: "dev"
  read_timeout: "10s"
  write_timeout: "15s"
  shutdown_timeout: "10s"

logger:
  level: "debug"

mysql:
  dsn: "root:root@tcp(127.0.0.1:3306)/zhiguang?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: "30m"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

auth:
  jwt:
    secret: "zhiguang-dev-jwt-secret"
    access_token_ttl: "15m"
    refresh_token_ttl: "168h"

oss:
  endpoint: ""
  access_key_id: ""
  access_key_secret: ""
  bucket: ""
  public_domain: ""
  folder: "avatars"
  presign_expire_seconds: 600

outbox:
  relay:
    batch_size: 100
    sink: "stdout"
  kafka:
    topic_default: "outbox.events"
    aggregate_topics: {}
